name: CI

on:
  push:
    branches: ["master"]
  pull_request:
    branches: ["master"]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Build & Test (Linux)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Swift
        uses: swift-actions/setup-swift@v2
        with:
          swift-version: "6.0"
      - name: Build
        run: swift build
      - name: Test
        run: swift test
      - name: Strict concurrency (library)
        run: |
          swift build -Xswiftc -strict-concurrency=complete --target Swollama 2>&1 | tee strict.log
          if grep -q "warning:" strict.log; then
            echo "::error::Swollama library emits strict-concurrency warnings"
            exit 1
          fi

  lint:
    name: Format Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Swift
        uses: swift-actions/setup-swift@v2
        with:
          swift-version: "6.0"
      - name: Check formatting
        run: |
          swift format --in-place --recursive Sources Tests Package.swift
          if ! git diff --quiet; then
            echo "::error::Code is not formatted. Run: swift format --in-place --recursive Sources Tests Package.swift"
            git diff --stat
            exit 1
          fi
